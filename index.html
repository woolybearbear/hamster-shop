function money(n) { return "NT$" + Number(n).toLocaleString(); }
function uid()    { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* 簡易密碼雜湊（使用瀏覽器原生 Web Crypto API，避免明碼存進資料庫） */
async function hashPassword(password) {
  const enc = new TextEncoder().encode(password);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}
/* 手機號碼格式驗證（台灣 09 開頭 10 碼） */
function isValidPhone(phone) { return /^09\d{8}$/.test(phone); }

/* 圖片壓縮：上傳前縮小尺寸並轉成 JPEG，避免 base64 超過 Firestore 單文件 1MB 限制 */
function compressImage(file, maxDim = 800, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("圖片讀取失敗"));
    reader.onload = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error("圖片格式無法解析"));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ══════════════════════════════════════════
   SHOP HOME
══════════════════════════════════════════ */
function ShopHome({ settings, products, cats, cart, onAddToCart, onChangeQty, onAddVariant, onChangeQtyVariant, onGoCart, onGoAdmin, onPolicyClick, member, onGoMemberAuth, onLogoutMember, onDetailChange, onGoHome }) {
  const [cat, setCat] = useState("all");
  const [detailId, setDetailIdRaw] = useState(null);
  const setDetailId = id => { setDetailIdRaw(id); if (onDetailChange) onDetailChange(!!id); };
  const cartCount = Object.values(cart).reduce((a, b) => a + b, 0);
  const activeProducts = products.filter(p => p.active !== false);
  const filtered = cat === "all" ? activeProducts : activeProducts.filter(p => p.cat === cat);

  if (detailId) {
    const p = products.find(x => x.id == detailId);
    if (p) return (
      <ProductDetail
        settings={settings}
        product={p}
        cart={cart}
        onAddVariant={onAddVariant}
        onChangeQtyVariant={onChangeQtyVariant}
        onBack={() => setDetailId(null)}
      />
    );
  }

  return (
    <div>
      <div style={{ position: "sticky", top: 0, zIndex: 20 }}>
        <StorefrontHeader settings={settings} cartCount={cartCount} onGoCart={onGoCart} onGoAdmin={onGoAdmin} member={member} onGoMemberAuth={onGoMemberAuth} onGoHome={onGoHome} />
      </div>

      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: 100 }}>
        {/* Hero */}
        <div style={{
          margin: "14px 14px 0", borderRadius: 20,
          border: "none", position: "relative", overflow: "hidden",
          minHeight: 140,
          background: settings.heroImg
            ? `url(${settings.heroImg}) center/cover no-repeat`
            : "linear-gradient(135deg, #5AACCF 0%, #3D8FB3 100%)",
        }}>
          {/* 圖片時加暗色遮罩 */}
          {settings.heroImg && (
            <div style={{ position: "absolute", inset: 0, background: "rgba(20,12,4,.52)", borderRadius: 18 }} />
          )}
          <div style={{ position: "relative", zIndex: 1, padding: "22px 22px 18px" }}>
            {settings.heroBadge && (
              <div style={{ display: "inline-block", background: C.ham, color: "#fff",
                fontSize: 11, fontWeight: 700, fontFamily: SANS, padding: "3px 10px",
                borderRadius: 10, marginBottom: 10, boxShadow: `0 2px 0 ${C.hamDark}` }}>
                {settings.heroBadge}
              </div>
            )}
            <div style={{ fontFamily: SERIF, fontSize: 20, fontWeight: 900, color: "#fff", lineHeight: 1.45, marginBottom: 8, whiteSpace: "pre-line" }}>
              {settings.heroTitle}
            </div>
            {settings.heroPrice && (
              <div>
                <span style={{ fontFamily: SERIF, fontSize: 24, fontWeight: 900, color: C.hamMid }}>NT${settings.heroPrice}</span>
                {settings.heroOrigPrice && (
                  <span style={{ fontFamily: SANS, fontSize: 13, color: "rgba(255,255,255,.4)", textDecoration: "line-through", marginLeft: 10 }}>NT${settings.heroOrigPrice}</span>
                )}
              </div>
            )}
          </div>
        </div>

        {/* Cats */}
        <div style={{ display: "flex", gap: 8, padding: "14px 14px 6px", overflowX: "auto" }}>
          {cats.map(c => <PillTab key={c.id} label={c.label} active={cat === c.id} onClick={() => setCat(c.id)} />)}
        </div>

        <SectionLabel>商品列表</SectionLabel>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, padding: "0 14px" }}>
          {filtered.map(p => (
            <ProductCard key={p.id} product={p} qty={cart[p.id] || 0} onAdd={() => onAddToCart(p.id)} onDetail={() => setDetailId(p.id)} />
          ))}
        </div>
      </div>
      <StorefrontFooter settings={settings} onPolicyClick={onPolicyClick} onGoAdmin={onGoAdmin} />
    </div>
  );
}

function ProductCard({ product: p, qty, onAdd, onDetail }) {
  const hasVariants = (p.variants || []).length > 0;
  const minPrice = hasVariants ? Math.min(...p.variants.map(v => v.groupPrice > 0 ? v.groupPrice : v.price)) : null;
  const totalStock = hasVariants ? p.variants.reduce((a, v) => a + (v.stock || 0), 0) : p.stock;
  return (
    <TagCard style={{ overflow: "hidden", cursor: "pointer" }} onClick={onDetail}>
      <div style={{ aspectRatio: "1", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 52, position: "relative", overflow: "hidden" }}>
        {p.img
          ? <img src={p.img} alt={p.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
          : <span>{p.em}</span>}
        {qty > 0 && (
          <div style={{ position: "absolute", top: 8, right: 8, background: C.ham, color: "#fff",
            fontSize: 11, fontWeight: 700, width: 22, height: 22, borderRadius: "50%",
            display: "flex", alignItems: "center", justifyContent: "center", fontFamily: SANS }}>{qty}</div>
        )}
        {p.desc && (
          <div style={{ position: "absolute", bottom: 6, right: 6, background: "rgba(0,0,0,.35)", borderRadius: 20, padding: "2px 7px" }}>
            <span style={{ fontFamily: SANS, fontSize: 10, color: "#fff" }}>詳情</span>
          </div>
        )}
      </div>
      <div style={{ padding: "10px 12px 12px" }}>
        <div style={{ fontFamily: SERIF, fontSize: 13, fontWeight: 700, color: C.ink, marginBottom: 2, lineHeight: 1.35 }}>{p.name}</div>
        <div style={{ fontFamily: SANS, fontSize: 11, color: C.inkMuted, marginBottom: 8 }}>{p.unit}</div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            {hasVariants ? (
              <div style={{ display: "flex", alignItems: "baseline", gap: 3 }}>
                <span style={{ fontFamily: SANS, fontSize: 10, color: C.inkMuted }}>NT$</span>
                <span style={{ fontFamily: SERIF, fontSize: 15, fontWeight: 700, color: C.ham }}>{minPrice}</span>
                <span style={{ fontFamily: SANS, fontSize: 10, color: C.inkMuted }}>起</span>
              </div>
            ) : p.groupPrice > 0 ? (
              <>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontFamily: SANS, fontSize: 10, fontWeight: 700, color: "#fff", background: C.ham, borderRadius: 6, padding: "1px 5px" }}>團購價</span>
                  <span style={{ fontFamily: SERIF, fontSize: 15, fontWeight: 700, color: C.ham }}>{money(p.groupPrice)}</span>
                </div>
                <div style={{ fontFamily: SANS, fontSize: 10, color: C.inkMuted, textDecoration: "line-through", marginTop: 1 }}>{money(p.price)}</div>
              </>
            ) : (
              <span style={{ fontFamily: SERIF, fontSize: 15, fontWeight: 700, color: C.ham }}>{money(p.price)}</span>
            )}
          </div>
          {totalStock > 0
            ? hasVariants
              ? <button onClick={e => { e.stopPropagation(); onDetail(); }} style={{ padding: "6px 12px", borderRadius: 20, background: C.ham, border: "none", color: "#fff", fontSize: 11, fontWeight: 700, cursor: "pointer", boxShadow: `0 2px 0 ${C.hamDark}` }}>選規格</button>
              : qty >= totalStock
                ? <span style={{ fontFamily: SANS, fontSize: 10, fontWeight: 700, color: C.inkMuted, background: C.bg, borderRadius: 20, padding: "5px 10px" }}>已達上限</span>
                : <button onClick={e => { e.stopPropagation(); onAdd(); }} style={{ width: 30, height: 30, borderRadius: "50%", background: C.ham, border: "none", color: "#fff", fontSize: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 2px 0 ${C.hamDark}` }}>+</button>
            : <span style={{ fontFamily: SANS, fontSize: 11, fontWeight: 700, color: C.danger }}>缺貨</span>
          }
        </div>
      </div>
    </TagCard>
  );
}

function ProductDetail({ settings, product: p, cart, onAddVariant, onChangeQtyVariant, onBack }) {

  const [selVariant, setSelVariant] = useState(hasVariants ? p.variants[0] : null);

  const cartKey = hasVariants && selVariant ? `${p.id}::${selVariant.name}` : String(p.id);
  const qty = cart[cartKey] || 0;
  const curPrice = hasVariants && selVariant ? selVariant.price : p.price;
  const curGroupPrice = hasVariants && selVariant ? selVariant.groupPrice : p.groupPrice;
  const curStock = hasVariants && selVariant ? selVariant.stock : p.stock;

  return (
    <div>
      <div style={{ position: "sticky", top: 0, zIndex: 20 }}>
        <StorefrontHeader settings={settings} cartCount={Object.values(cart).reduce((a,b)=>a+b,0)} onGoCart={() => {}} onGoAdmin={() => {}} />
      </div>
      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: 120 }}>
        {/* Back */}
        <div style={{ padding: "14px 16px 0" }}>
          <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: C.ham, fontFamily: SANS, fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", gap: 4 }}>
            ← 返回商品列表
          </button>
        </div>

        {/* 商品圖 */}
        <div style={{ margin: "12px 14px 0", borderRadius: 20, overflow: "hidden", border: `1.5px solid ${C.line}`, aspectRatio: "1", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 80 }}>
          {p.img
            ? <img src={p.img} alt={p.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            : <span>{p.em}</span>}
        </div>

        {/* 商品基本資訊 */}
        <div style={{ padding: "18px 18px 0" }}>
          <div style={{ fontFamily: SERIF, fontSize: 22, fontWeight: 900, color: C.ink, lineHeight: 1.3, marginBottom: 4 }}>{p.name}</div>
          {p.unit && <div style={{ fontFamily: SANS, fontSize: 13, color: C.inkMuted, marginBottom: 12 }}>{p.unit}</div>}
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
            {curGroupPrice > 0 ? (
              <>
                <span style={{ fontFamily: SANS, fontSize: 12, fontWeight: 700, color: "#fff", background: C.ham, borderRadius: 8, padding: "2px 8px", alignSelf: "center" }}>團購價</span>
                <span style={{ fontFamily: SERIF, fontSize: 26, fontWeight: 900, color: C.ham }}>{money(curGroupPrice)}</span>
                <span style={{ fontFamily: SANS, fontSize: 15, color: C.inkMuted, textDecoration: "line-through" }}>{money(curPrice)}</span>
              </>
            ) : (
              <span style={{ fontFamily: SERIF, fontSize: 26, fontWeight: 900, color: C.ham }}>{money(curPrice)}</span>
            )}
          </div>

          {/* 規格選擇器 */}
          {hasVariants && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontFamily: SANS, fontSize: 12, fontWeight: 700, color: C.inkSoft, marginBottom: 8 }}>選擇規格</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {p.variants.map((v, i) => {
                  const isSel = selVariant && selVariant.name === v.name;
                  const soldOut = (v.stock || 0) <= 0;
                  return (
                    <button key={i}
                      disabled={soldOut}
                      onClick={() => setSelVariant(v)}
                      style={{
                        padding: "8px 16px", borderRadius: 20, fontFamily: SANS, fontSize: 13,
                        border: isSel ? `2px solid ${C.ham}` : `1.5px solid ${C.line}`,
                        background: soldOut ? "#F5F5F5" : isSel ? C.hamLight : "#fff",
                        color: soldOut ? C.inkMuted : isSel ? C.ham : C.inkSoft,
                        fontWeight: isSel ? 700 : 400,
                        cursor: soldOut ? "not-allowed" : "pointer",
                        opacity: soldOut ? 0.5 : 1,
                        textDecoration: soldOut ? "line-through" : "none",
                      }}>{v.name}{soldOut ? "（售完）" : ""}</button>
                  );
                })}
              </div>
            </div>
          )}

          {/* 庫存狀態 */}
          <div style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 12px", borderRadius: 20, marginBottom: 20,
            background: curStock > 0 ? C.leafLight : C.dangerLight,
            border: `1px solid ${curStock > 0 ? C.leaf : C.danger}40`,
          }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%", background: curStock > 0 ? C.leaf : C.danger }} />
            <span style={{ fontFamily: SANS, fontSize: 12, fontWeight: 700, color: curStock > 0 ? C.leaf : C.danger }}>
              {curStock > 0 ? `尚有庫存 ${curStock} 件` : "已售完"}

          </div>

          {/* 詳細說明 */}
          {p.desc && (
            <TagCard style={{ padding: 18, marginBottom: 16 }}>
              <div style={{ fontFamily: SERIF, fontSize: 14, fontWeight: 900, color: C.ink, marginBottom: 10 }}>商品說明</div>
              <div style={{ fontFamily: SANS, fontSize: 13, color: C.inkSoft, lineHeight: 2, whiteSpace: "pre-wrap" }}>{p.desc}</div>
            </TagCard>
          )}
        </div>
      </div>

      {/* 底部加入購物車 */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: C.card, borderTop: `1.5px solid ${C.line}`, padding: "14px 20px 28px", zIndex: 30 }}>
        {curStock > 0 ? (
          qty > 0 ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, background: C.bg, borderRadius: 40, padding: "6px 14px", border: `1.5px solid ${C.line}` }}>
                  <button onClick={() => onChangeQtyVariant(p, selVariant, -1)} style={{ width: 30, height: 30, borderRadius: "50%", border: `1.5px solid ${C.line}`, background: "#fff", cursor: "pointer", fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                  <span style={{ fontFamily: SERIF, fontSize: 16, fontWeight: 700, minWidth: 24, textAlign: "center" }}>{qty}</span>
                  <button
                    onClick={() => qty < curStock && onChangeQtyVariant(p, selVariant, 1)}
                    disabled={qty >= curStock}
                    style={{
                      width: 30, height: 30, borderRadius: "50%", border: "none",
                      background: qty >= curStock ? C.line : C.ham,
                      color: "#fff", cursor: qty >= curStock ? "not-allowed" : "pointer",
                      fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center",
                      boxShadow: qty >= curStock ? "none" : `0 2px 0 ${C.hamDark}`,
                    }}>+</button>
                </div>
                <Btn variant="ham" onClick={() => qty < curStock && onAddVariant(p, selVariant)} full disabled={qty >= curStock}> 再加一件</Btn>
              </div>
              {qty >= curStock && (
                <p style={{ fontFamily: SANS, fontSize: 11, color: C.danger, textAlign: "center", margin: 0 }}>已達庫存上限（{curStock} 件）</p>
              )}
            </div>
          ) : (
            <Btn variant="ham" onClick={() => onAddVariant(p, selVariant)} full> 加入購物車</Btn>
          )
        ) : (
          <Btn variant="subtle" disabled full>已售完</Btn>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   CART
══════════════════════════════════════════ */
function CartScreen({ settings, products, cart, member, onGoHome, onGoMemberAuth, onBack, onGoCheckout, onChangeQty, onChangeQtyVariant }) {
  const resolveKey = key => {
    const [pid, vname] = String(key).split("::");
    const p = products.find(x => String(x.id) === pid);
    if (!p) return null;
    const v = vname ? (p.variants || []).find(v => v.name === vname) : null;
    return { product: p, variant: v };
  };
  const priceOf = key => {
    const r = resolveKey(key);
    if (!r) return 0;
    const { product: p, variant: v } = r;
    if (v) return v.groupPrice > 0 ? v.groupPrice : v.price;
    return p.groupPrice > 0 ? p.groupPrice : p.price;
  };

  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  const total = keys.reduce((acc, key) => acc + priceOf(key) * cart[key], 0);
  const cartCount = Object.values(cart).reduce((a, b) => a + b, 0);

  return (
    <div>
      <div style={{ position: "sticky", top: 0, zIndex: 20 }}>
        <StorefrontHeader settings={settings} cartCount={cartCount} onGoCart={() => {}} onGoAdmin={() => {}} member={member} onGoMemberAuth={onGoMemberAuth} onGoHome={onGoHome} />
      </div>
      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: 120 }}>
        <div style={{ padding: "16px 16px 0", display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: C.ham, fontSize: 14, fontFamily: SANS, fontWeight: 700 }}>← 繼續選購</button>
          <span style={{ fontFamily: SERIF, fontSize: 17, fontWeight: 900, color: C.ink }}>購物車</span>
        </div>
        {keys.length === 0
          ? <div style={{ textAlign: "center", padding: "80px 20px" }}>
              <div style={{ fontSize: 48, marginBottom: 14 }}></div>
              <p style={{ fontFamily: SANS, color: C.inkSoft, fontSize: 14 }}>購物車是空的，回去挑選吧！</p>
            </div>
          : <div style={{ padding: "10px 14px" }}>
              {keys.map(key => {
                const r = resolveKey(key);
                if (!r) return null;
                const { product: p, variant: v } = r;
                const unitPrice = priceOf(key);
                const stockLimit = v ? Number(v.stock || 0) : Number(p.stock || 0);
                const atLimit = cart[key] >= stockLimit;
                return (
                  <TagCard key={key} style={{ padding: "14px 16px", marginBottom: 10, display: "flex", alignItems: "center", gap: 14 }}>
                    <div style={{ width: 52, height: 52, borderRadius: 10, overflow: "hidden", background: C.bg, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {p.img
                        ? <img src={p.img} alt={p.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                        : <span style={{ fontSize: 32 }}>{p.em}</span>}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontFamily: SERIF, fontSize: 14, fontWeight: 700, color: C.ink }}>{p.name}{v ? `（${v.name}）` : ""}</div>
                      <div style={{ fontFamily: SANS, fontSize: 12, color: C.inkSoft, marginTop: 2 }}>{money(unitPrice)} / 份</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 8 }}>
                        <button onClick={() => onChangeQtyVariant(p, v, -1)} style={{ width: 28, height: 28, borderRadius: "50%", border: `1.5px solid ${C.line}`, background: C.bg, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                        <span style={{ fontFamily: SERIF, fontSize: 14, fontWeight: 700, minWidth: 22, textAlign: "center" }}>{cart[key]}</span>
                        <button
                          onClick={() => !atLimit && onChangeQtyVariant(p, v, 1)}
                          disabled={atLimit}
                          style={{
                            width: 28, height: 28, borderRadius: "50%",
                            border: `1.5px solid ${atLimit ? C.line : C.line}`,
                            background: atLimit ? "#F5F5F5" : C.bg,
                            color: atLimit ? C.inkMuted : C.ink,
                            cursor: atLimit ? "not-allowed" : "pointer", fontSize: 16,
                            display: "flex", alignItems: "center", justifyContent: "center",
                          }}>+</button>
                        <span style={{ fontFamily: SANS, fontSize: 13, fontWeight: 700, color: C.ham, marginLeft: "auto" }}>{money(unitPrice * cart[key])}</span>
                      </div>
                      {atLimit && <p style={{ fontFamily: SANS, fontSize: 10, color: C.danger, marginTop: 4 }}>已達庫存上限（{stockLimit} 件）</p>}
                    </div>
                  </TagCard>
                );
              })}
            </div>
        }
      </div>
      {keys.length > 0 && (
        <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: C.card, borderTop: `1.5px solid ${C.line}`, padding: "14px 20px 24px", zIndex: 30 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <span style={{ fontFamily: SANS, fontSize: 14, color: C.inkSoft }}>合計</span>
            <span style={{ fontFamily: SERIF, fontSize: 22, fontWeight: 900, color: C.ink }}>{money(total)}</span>
          </div>
          <Btn variant="ham" onClick={onGoCheckout} full>前往結帳 →</Btn>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   CHECKOUT  — 付款流程整合版
══════════════════════════════════════════ */
function CheckoutScreen({ settings, products, cart, member, onBack, onPlaceOrder }) {
  const resolveKey = key => {
    const [pid, vname] = String(key).split("::");
    const p = products.find(x => String(x.id) === pid);
    if (!p) return null;
    const v = vname ? (p.variants || []).find(v => v.name === vname) : null;
    return { product: p, variant: v };
  };
  const priceOf = key => {
    const r = resolveKey(key);
    if (!r) return 0;
    const { product: p, variant: v } = r;
    if (v) return v.groupPrice > 0 ? v.groupPrice : v.price;
    return p.groupPrice > 0 ? p.groupPrice : p.price;
  };

  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  const subtotal  = keys.reduce((acc, key) => acc + priceOf(key) * cart[key], 0);
  const cartCount = Object.values(cart).reduce((a, b) => a + b, 0);

  const [form, setForm] = useState({
    name: member?.name || "", phone: member?.phone || "", lineId: member?.lineId || "", lineName: "",
    pickup: settings.pickupOptions[0] || "",
    pay: settings.payOptions[0] || "",
    note: "",
  });
  const [step, setStep] = useState("form");  // "form" | "payment"
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const isConvenience  = form.pickup === "超商取貨";
  const freeThreshold  = Number(settings.freeShippingThreshold) || 500;
  const COD_TOTAL      = 58;   // 賣貨便固定：$20 代收費 + $38 運費，取貨時一律付此金額
  const isFreeShipping = subtotal >= freeThreshold;

  // 匯款金額邏輯：
  // 超商取貨時，代收費 $20 一律從匯款扣除（賣貨便規定）
  // 未達免運 → 匯款 = 商品小計 - $20（運費 $38 取貨時付；代收費 $20 預扣）
  // 已達免運 → 匯款 = 商品小計 - $58（運費 $38 + 代收費 $20 全折抵；取貨仍付現 $58）
  const COD_FEE = 20;
  const payNow = isConvenience
    ? isFreeShipping
      ? subtotal - COD_TOTAL
      : subtotal - COD_FEE
    : subtotal;

  const inputSt = {
    width: "100%", padding: "11px 14px", borderRadius: 12,
    border: `1.5px solid ${C.line}`, background: "#fff",
    color: C.ink, fontFamily: SANS, fontSize: 14, outline: "none",
  };

  const [placing, setPlacing] = useState(false);
  const [placeError, setPlaceError] = useState("");

  const handleConfirm = async () => {
    if (!form.name.trim() || !form.phone.trim() || !form.lineName.trim()) return;
    if (form.pay === "Line Pay") {
      // 直接導向 Line Pay，同時記訂單（先扣庫存成功才跳轉付款）
      setPlaceError("");
      setPlacing(true);
      try {
        await onPlaceOrder({ ...form, payNow, subtotal });
        window.open(settings.linePayUrl || "https://line.me/R/pay", "_blank");
      } catch (err) {
        setPlaceError(err?.message || "下單失敗，請稍後再試");
      }
      setPlacing(false);
    } else {
      // 銀行轉帳：進入確認付款畫面
      setStep("payment");
    }
  };

  const handleBankConfirm = async () => {
    setPlaceError("");
    setPlacing(true);
    try {
      await onPlaceOrder({ ...form, payNow, subtotal });
    } catch (err) {
      setPlaceError(err?.message || "下單失敗，請稍後再試");
    }
    setPlacing(false);
  };

  // ── 付款確認畫面（銀行轉帳）
  if (step === "payment") return (
    <div>
      <div style={{ position: "sticky", top: 0, zIndex: 20 }}>
        <StorefrontHeader settings={settings} cartCount={0} onGoCart={() => {}} onGoAdmin={() => {}} />
      </div>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 16px 40px" }}>
        <button onClick={() => setStep("form")} style={{ background: "none", border: "none", cursor: "pointer", color: C.ham, fontSize: 14, fontFamily: SANS, fontWeight: 700, marginBottom: 20 }}>← 修改訂單</button>

        {/* 金額摘要 */}
        <TagCard style={{ padding: 20, marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: C.hamLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}></div>
            <span style={{ fontFamily: SERIF, fontSize: 15, fontWeight: 900, color: C.ink }}>付款金額明細</span>
          </div>

          {keys.map(key => {
            const r = resolveKey(key);
            if (!r) return null;
            const { product: p, variant: v } = r;
            return <div key={key} style={{ display: "flex", justifyContent: "space-between", fontFamily: SANS, fontSize: 13, color: C.inkSoft, padding: "3px 0" }}>
              <span>{p.em} {p.name}{v ? `（${v.name}）` : ""} × {cart[key]}</span><span>{money(priceOf(key) * cart[key])}</span>
            </div>;
          })}

          <div style={{ borderTop: `1.5px solid ${C.line}`, marginTop: 10, paddingTop: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontFamily: SANS, fontSize: 13, color: C.inkSoft, padding: "3px 0" }}>
              <span>商品小計</span><span>{money(subtotal)}</span>
            </div>

            {isConvenience && isFreeShipping && (
              <div style={{ display: "flex", justifyContent: "space-between", fontFamily: SANS, fontSize: 13, padding: "6px 8px", background: C.leafLight, borderRadius: 8, margin: "4px 0" }}>
                <div>
                  <div style={{ color: C.leaf, fontWeight: 700 }}> 免運資格折抵</div>
                  <div style={{ fontSize: 11, color: C.leaf, marginTop: 2 }}>{`取貨時仍須付現 NT$${COD_TOTAL}`}</div>
                </div>
                <span style={{ color: C.leaf, fontWeight: 700 }}>{`− NT$${COD_TOTAL}`}</span>
              </div>
            )}

            {isConvenience && !isFreeShipping && (
              <div style={{ fontFamily: SANS, fontSize: 13, margin: "4px 0" }}>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", background: C.warnLight, borderRadius: "8px 8px 0 0" }}>
                  <div>
                    <div style={{ color: C.warn, fontWeight: 700 }}> 代收費預扣（從匯款扣除）</div>
                    <div style={{ fontSize: 11, color: C.warn, marginTop: 2 }}>賣貨便代收手續費</div>
                  </div>
                  <span style={{ color: C.warn, fontWeight: 700 }}>− NT$20</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", background: "#FFF8EE", borderRadius: "0 0 8px 8px" }}>
                  <div>
                    <div style={{ color: C.inkSoft, fontWeight: 700 }}> 取貨時付現給超商</div>
                    <div style={{ fontSize: 11, color: C.inkMuted, marginTop: 2 }}>運費 NT$38 + 代收費 NT$20</div>
                  </div>
                  <span style={{ color: C.inkSoft, fontWeight: 700 }}>{`NT$${COD_TOTAL}`}</span>
                </div>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, paddingTop: 8, borderTop: `1.5px solid ${C.line}` }}>
              <span style={{ fontFamily: SANS, fontSize: 15, fontWeight: 700, color: C.ink }}>現在需匯款</span>
              <span style={{ fontFamily: SERIF, fontSize: 20, fontWeight: 900, color: C.ham }}>{money(payNow)}</span>
            </div>
          </div>
        </TagCard>

        {/* 超商貨到付款說明 */}
        {isConvenience && (
          <div style={{ background: C.warnLight, border: `1.5px solid ${C.warn}40`, borderRadius: 12, padding: "12px 14px", marginBottom: 16 }}>
            <div style={{ fontFamily: SANS, fontSize: 12, fontWeight: 700, color: C.warn, marginBottom: 6 }}> 賣貨便貨到付款說明</div>
            <div style={{ fontFamily: SANS, fontSize: 12, color: "#7A5800", lineHeight: 1.8 }}>
              {`取貨時一律以現金支付超商 `}<b>{`NT$${COD_TOTAL}`}</b>（運費 NT$38 + 代收手續費 NT$20）。
              {isFreeShipping
                ? <><br /> 您已達免運資格，NT${COD_TOTAL} 已從匯款金額全額折抵，<b>匯款時不需再付運費</b>。</>
                : <><br /> 代收費 NT$20 已從您的匯款金額預扣。運費 NT$38 請取貨時直接付給超商人員，<b>不需匯入</b>帳戶。</>
              }
            </div>
          </div>
        )}

        {/* 銀行帳號 */}
        <TagCard style={{ padding: 20, marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
            <div style={{ width: 28, height: 28, borderRadius: 8, background: C.leafLight, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}></div>
            <span style={{ fontFamily: SERIF, fontSize: 15, fontWeight: 900, color: C.ink }}>銀行轉帳帳號</span>
          </div>
          {[
            ["銀行", settings.bankName],
            ["帳號", settings.bankAccount],
            ["戶名", settings.bankHolder],
          ].map(([label, val]) => (
            <div key={label} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 0", borderBottom: `1px solid ${C.line}` }}>
              <span style={{ fontFamily: SANS, fontSize: 12, color: C.inkSoft }}>{label}</span>
              <span style={{ fontFamily: SERIF, fontSize: 14, fontWeight: 700, color: C.ink }}>{val}</span>
            </div>
          ))}
          <div style={{ marginTop: 12, padding: "10px 12px", background: C.hamLight, borderRadius: 10 }}>
            <div style={{ fontFamily: SANS, fontSize: 11, color: C.ham, fontWeight: 700, marginBottom: 4 }}>付款後請至 Line 群組上傳轉帳截圖</div>

                  </div>
                </div>

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, padding: "8px 10px", background: C.leafLight, borderRadius: 8 }}>

                  </div>
                  <span style={{ fontFamily: SANS, fontSize: 13, color: C.leaf, fontWeight: 700, flexShrink: 0, marginLeft: 8 }}>{`− NT$${COD_TOTAL}`}</span>
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", paddingTop: 10, borderTop: `1.5px solid ${C.line}`, marginTop: 6 }}>

                  {form.pay === "Line Pay" ? "Line Pay 付款金額" : "現在需匯款"}

                <span style={{ fontFamily: SERIF, fontSize: 20, fontWeight: 900, color: C.ham }}>{money(payNow)}</span>
              </div>
            </div>
          </TagCard>

          {/* 貨到付款備注 */}
          {isConvenience && (
            <div style={{
              marginBottom: 20, padding: "10px 14px",
              background: "#FFFBF0", borderRadius: 10,
              border: `1px dashed ${C.warn}80`,
            }}>
              <p style={{ fontFamily: SANS, fontSize: 12, color: C.inkSoft, lineHeight: 1.8, margin: 0 }}>
                 <b style={{ color: C.ink }}>賣貨便貨到付款說明：</b>
                無論是否免運，取貨時一律以現金支付超商{" "}
                <b style={{ color: C.warn }}>{`NT$${COD_TOTAL}`}（運費 NT$38 + 代收手續費 NT$20）</b>。
                {isFreeShipping
                  ? <>{" "}因已達免運資格，此 {`NT$${COD_TOTAL}`} 已從匯款金額中折抵，取貨付現即可。</>
                  : <>{" "}請備妥現金交給超商人員。</>
                }
              </p>
            </div>
          )}

          {placeError && (
            <div style={{ marginBottom: 14, padding: "10px 14px", borderRadius: 10, background: C.dangerLight, border: `1.5px solid ${C.danger}40` }}>
              <p style={{ fontFamily: SANS, fontSize: 12, color: C.danger, lineHeight: 1.6, margin: 0 }}>{placeError}</p>
            </div>
          )}
          <Btn
            variant={form.pay === "Line Pay" ? "ghost" : "ham"}
            onClick={handleConfirm}
            disabled={!form.name.trim() || !form.phone.trim() || !form.lineName.trim() || placing}
            full
          >
            {placing ? "處理中…" : form.pay === "Line Pay" ? " 前往 Line Pay 付款" : "查看匯款帳號並下單"}
          </Btn>
          <p style={{ fontFamily: SANS, fontSize: 12, color: C.inkMuted, textAlign: "center", marginTop: 10 }}>
            {form.pay === "Line Pay" ? "點擊後將跳轉至 Line Pay 完成付款" : "下一步將顯示轉帳帳號"}
          </p>
        </div>
      </div>
    </div>
  );
}

            <div style={{ background: "#F0FFF4", borderRadius: 10, padding: "10px 14px" }}>
              <p style={{ fontFamily: SANS, fontSize: 13, color: "#007A00" }}>Line Pay 付款連結已在下單時開啟，若尚未付款請重新前往完成。</p>
            </div>
          )}
        </div>

        {/* 操作按鈕 */}
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <Btn variant="primary" onClick={onContinue} full>繼續購物</Btn>
          <button onClick={onViewOrders} style={{ background: "none", border: "none", cursor: "pointer", color: C.ham, fontFamily: SANS, fontSize: 14, fontWeight: 700 }}>查看訂單狀態</button>
        </div>
      </div>
      <StorefrontFooter settings={settings} onPolicyClick={onPolicyClick} onGoAdmin={onGoAdmin} />
    </div>
  );
}

function MemberScreen({ settings, member, orders, cart, onBack, onGoHome, onPolicyClick, onGoAdmin, onViewOrder, onLogout, onUpdateMember, onChangePassword }) {
  const SC = {
    pending:   { label: "待確認", bg: C.warnLight,  color: C.warn },
    paid:      { label: "已付款", bg: C.leafLight,   color: C.leaf },
    shipping:  { label: "待出貨", bg: "#EEF2FF",     color: "#4F5FAD" },
    shipped:   { label: "已出貨", bg: "#F3E8FF",     color: "#7C3AED" },
    ready:     { label: "可取貨", bg: C.hamLight,    color: C.ham  },
    done:      { label: "已完成", bg: C.bg,          color: C.inkSoft },
    cancelled: { label: "已取消", bg: C.dangerLight, color: C.danger },

  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({ name: member.name || "", lineId: member.lineId || "", birthday: member.birthday || "" });
  const [busy, setBusy] = useState(false);

  const [newPwd, setNewPwd] = useState("");
  const [newPwd2, setNewPwd2] = useState("");

  const [pwdErr, setPwdErr] = useState("");
  const [pwdMsg, setPwdMsg] = useState("");

  const inputSt = {
    width: "100%", padding: "9px 12px", borderRadius: 10,
    border: `1.5px solid ${C.line}`, background: "#fff",
    color: C.ink, fontFamily: SANS, fontSize: 13, outline: "none",
  };

  const startEdit = () => { setDraft({ name: member.name || "", lineId: member.lineId || "", birthday: member.birthday || "" }); setErr(""); setEditing(true); };
  const cancelEdit = () => { setEditing(false); setErr(""); };
  const saveEdit = async () => {
    setErr("");
    if (!draft.name.trim()) { setErr("姓名不可空白"); return; }
    setBusy(true);
    try {
      await onUpdateMember(draft);
      setEditing(false);
    } catch (e) {
      setErr("儲存失敗，請檢查網路連線後再試一次");
    }
    setBusy(false);
  };

  const startChangePwd = () => { setOldPwd(""); setNewPwd(""); setNewPwd2(""); setPwdErr(""); setPwdMsg(""); setChangingPwd(true); };
  const cancelChangePwd = () => { setChangingPwd(false); setPwdErr(""); };
  const submitChangePwd = async () => {
    setPwdErr("");
    if (!oldPwd) { setPwdErr("請輸入目前的密碼"); return; }
    if (newPwd.length < 4) { setPwdErr("新密碼至少需 4 碼"); return; }
    if (newPwd !== newPwd2) { setPwdErr("兩次輸入的新密碼不一致"); return; }
    setPwdBusy(true);
    try {
      await onChangePassword(oldPwd, newPwd);
      setPwdMsg("密碼已更新，下次登入請使用新密碼");
      setChangingPwd(false);
    } catch (e) {
      setPwdErr(e?.message || "密碼變更失敗，請稍後再試");
    }
    setPwdBusy(false);
  };

  return (
    <div>
      <div style={{ position: "sticky", top: 0, zIndex: 20 }}>
        <StorefrontHeader settings={settings} cartCount={cartCount} onGoCart={() => {}} onGoAdmin={() => {}} member={member} onGoMemberAuth={() => {}} onGoHome={onGoHome} />
      </div>
      <div style={{ maxWidth: 480, margin: "0 auto", paddingBottom: 100 }}>
        <div style={{ padding: "16px 16px 0", display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>

        </div>

              <div style={{ flex: 1 }}>

              </div>

/* ══════════════════════════════════════════
   MEMBER AUTH — 會員登入／註冊
══════════════════════════════════════════ */
function MemberAuth({ settings, onAuthed, onBack, db }) {
  const [mode, setMode] = useState("login"); // "login" | "register"
  const [phone, setPhone] = useState("");
  const [password, setPassword] = useState("");
  const [name, setName] = useState("");
  const [lineId, setLineIdField] = useState("");
  const [birthday, setBirthday] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const [showForgot, setShowForgot] = useState(false);

  const inputSt = {
    width: "100%", padding: "13px 16px", borderRadius: 12,
    border: `1.5px solid ${C.line}`, background: "#fff",
    color: C.ink, fontFamily: SANS, fontSize: 15, outline: "none",
  };

  const handleLogin = async () => {
    setErr("");
    if (!isValidPhone(phone)) { setErr("請輸入正確的手機號碼格式（09xxxxxxxx）"); return; }
    if (!password) { setErr("請輸入密碼"); return; }
    setBusy(true);
    try {
      const { firestore, doc, getDoc } = db.current;
      const snap = await getDoc(doc(firestore, "members", phone));
      if (!snap.exists()) { setErr("此手機號碼尚未註冊，請先註冊會員"); setBusy(false); return; }
      const member = snap.data();
      const hashed = await hashPassword(password);
      if (member.passwordHash !== hashed) { setErr("密碼錯誤，請再試一次"); setBusy(false); return; }
      onAuthed({ phone, name: member.name, lineId: member.lineId || "", birthday: member.birthday || "" });
    } catch (e) {
      setErr("登入失敗，請檢查網路連線後再試一次");
    }
    setBusy(false);
  };

  const handleRegister = async () => {
    setErr("");
    if (!name.trim()) { setErr("請輸入姓名"); return; }
    if (!isValidPhone(phone)) { setErr("請輸入正確的手機號碼格式（09xxxxxxxx）"); return; }
    if (password.length < 4) { setErr("密碼至少需 4 碼"); return; }
    setBusy(true);
    try {
      const { firestore, doc, getDoc, setDoc } = db.current;
      const snap = await getDoc(doc(firestore, "members", phone));
      if (snap.exists()) { setErr("此手機號碼已經註冊過了，請直接登入"); setBusy(false); return; }
      const hashed = await hashPassword(password);
      const member = { phone, name: name.trim(), lineId: lineId.trim(), birthday: birthday || "", passwordHash: hashed, createdAt: new Date().toISOString() };
      await setDoc(doc(firestore, "members", phone), member);
      onAuthed({ phone, name: member.name, lineId: member.lineId, birthday: member.birthday });
    } catch (e) {
      setErr("註冊失敗，請檢查網路連線後再試一次");
    }
    setBusy(false);
  };

  return (
    <div style={{ background: C.bg, minHeight: "100vh" }}>
      <div style={{ maxWidth: 420, margin: "0 auto", padding: "50px 24px 40px" }}>
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: C.ham, fontFamily: SANS, fontSize: 14, fontWeight: 700, marginBottom: 30 }}>← 返回購物</button>

        <div style={{ textAlign: "center", marginBottom: 30 }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>{settings.shopEmoji || ""}</div>
          <h2 style={{ fontFamily: SERIF, fontSize: 22, fontWeight: 900, color: C.ink, marginBottom: 6 }}>
            {mode === "login" ? "會員登入" : "註冊新帳號"}
          </h2>
          <p style={{ fontFamily: SANS, fontSize: 13, color: C.inkSoft }}>
            {mode === "login" ? "登入查看您的訂單記錄" : "建立帳號，訂單記錄永久保存"}
          </p>
        </div>

        <TagCard style={{ padding: 22 }}>
          {mode === "register" && (
            <div style={{ marginBottom: 14 }}>
              <FieldLabel>姓名</FieldLabel>
              <input style={inputSt} value={name} onChange={e => setName(e.target.value)} placeholder="您的姓名" />
            </div>
          )}
          <div style={{ marginBottom: 14 }}>
            <FieldLabel>手機號碼</FieldLabel>
            <input style={inputSt} type="tel" inputMode="numeric" maxLength={10} value={phone} onChange={e => { if (/^\d{0,10}$/.test(e.target.value)) setPhone(e.target.value); }} placeholder="09xxxxxxxx" />
          </div>
          {mode === "register" && (
            <div style={{ marginBottom: 14 }}>
              <FieldLabel>Line ID <span style={{ fontWeight: 400, color: C.inkMuted }}>（選填）</span></FieldLabel>
              <input style={inputSt} value={lineId} onChange={e => setLineIdField(e.target.value)} placeholder="方便店家聯繫您" />
            </div>
          )}
          {mode === "register" && (
            <div style={{ marginBottom: 14 }}>
              <FieldLabel>生日 <span style={{ fontWeight: 400, color: C.inkMuted }}>（選填，生日當月可能享有優惠）</span></FieldLabel>
              <input style={inputSt} type="date" value={birthday} onChange={e => setBirthday(e.target.value)} />
            </div>
          )}
          <div style={{ marginBottom: 8 }}>
            <FieldLabel>密碼</FieldLabel>
            <input style={inputSt} type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder={mode === "register" ? "至少 4 碼" : "請輸入密碼"} />
          </div>

          {mode === "login" && (
            <div style={{ textAlign: "right", marginBottom: 4 }}>
              <button
                onClick={() => setShowForgot(s => !s)}
                style={{ background: "none", border: "none", cursor: "pointer", color: C.inkMuted, fontFamily: SANS, fontSize: 12, textDecoration: "underline" }}
              >忘記密碼？</button>
            </div>
          )}

          {mode === "login" && showForgot && (
            <div style={{ marginBottom: 10, padding: "10px 14px", borderRadius: 10, background: C.bg, border: `1px dashed ${C.line}` }}>
              <p style={{ fontFamily: SANS, fontSize: 12, color: C.inkSoft, lineHeight: 1.8, margin: 0 }}>
                請透過 Line 私訊店家告知您的手機號碼，店家會為您重設一組臨時密碼。登入後請至「我的會員」→「修改密碼」設定您自己的新密碼。
                {settings.lineId && <><br />Line：<b style={{ color: C.ink }}>{settings.lineId}</b></>}
              </p>
            </div>
          )}

          {err && (
            <div style={{ marginTop: 10, padding: "10px 14px", borderRadius: 10, background: C.dangerLight, border: `1.5px solid ${C.danger}40` }}>
              <p style={{ fontFamily: SANS, fontSize: 12, color: C.danger, margin: 0, lineHeight: 1.6 }}>{err}</p>
            </div>
          )}

          <div style={{ marginTop: 18 }}>
            <Btn variant="ham" full disabled={busy} onClick={mode === "login" ? handleLogin : handleRegister}>
              {busy ? "處理中…" : mode === "login" ? "登入" : "註冊"}
            </Btn>
          </div>
        </TagCard>

        <div style={{ textAlign: "center", marginTop: 18 }}>
          <button
            onClick={() => { setMode(m => m === "login" ? "register" : "login"); setErr(""); setShowForgot(false); }}
            style={{ background: "none", border: "none", cursor: "pointer", color: C.ham, fontFamily: SANS, fontSize: 13, fontWeight: 700 }}
          >
            {mode === "login" ? "還沒有帳號？點此註冊" : "已經有帳號？點此登入"}
          </button>
        </div>
      </div>
    </div>
  );
}

function AdminLogin({ settings, onAuthed, onBack }) {
  const [digits, setDigits] = useState([]);   // max 6
  const [shake,  setShake]  = useState(false);
  const [err,    setErr]    = useState(false);
  const PIN_LEN = 6;

  const press = d => {
    if (digits.length >= PIN_LEN) return;
    setErr(false);
    const next = [...digits, d];
    setDigits(next);
    if (next.length === PIN_LEN) {
      if (next.join("") === settings.adminPin) {
        onAuthed();
      } else {
        setShake(true);
        setErr(true);
        setTimeout(() => { setShake(false); setDigits([]); }, 700);
      }
    }
  };
  const del = () => { if (digits.length > 0) { setDigits(d => d.slice(0, -1)); setErr(false); } };

  const KEYS = [
    [1,2,3],
    [4,5,6],
    [7,8,9],
    ["←",0,""],   // ← = backspace, "" = placeholder
  ];

  return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <div style={{ maxWidth: 360, margin: "0 auto", padding: "50px 24px 40px", flex: 1, display: "flex", flexDirection: "column" }}>
        {/* Back */}
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: C.ham, fontFamily: SANS, fontSize: 14, fontWeight: 700, marginBottom: 36, alignSelf: "flex-start" }}>← 返回前台</button>

        {/* Icon + title */}
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ width: 64, height: 64, borderRadius: 20, background: C.forest, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 14px", boxShadow: `0 4px 0 ${C.forestDark}`, fontFamily: SERIF, fontSize: 22, fontWeight: 900, color: "#fff", letterSpacing: "-1px" }}>管理</div>
          <div style={{ fontFamily: SERIF, fontSize: 22, fontWeight: 900, color: C.ink }}>店家後台</div>
          <div style={{ fontFamily: SANS, fontSize: 13, color: C.inkSoft, marginTop: 5 }}>請輸入 6 位數管理密碼</div>
        </div>

        {/* Dot indicators */}
        <div style={{
          display: "flex", justifyContent: "center", gap: 14, marginBottom: 10,
          animation: shake ? "shake .6s ease" : "none",
        }}>
          <style>{`
            @keyframes shake {
              0%,100%{transform:translateX(0)}
              15%{transform:translateX(-8px)}
              30%{transform:translateX(8px)}
              45%{transform:translateX(-6px)}
              60%{transform:translateX(6px)}
              75%{transform:translateX(-3px)}
              90%{transform:translateX(3px)}
            }
          `}</style>
          {Array.from({ length: PIN_LEN }).map((_, i) => {
            const filled = i < digits.length;
            return (
              <div key={i} style={{
                width: 18, height: 18, borderRadius: "50%",
                background: err ? C.danger : filled ? C.forest : "transparent",
                border: `2px solid ${err ? C.danger : filled ? C.forest : C.inkMuted}`,
                transition: "all .15s",
              }} />
            );
          })}
        </div>
        {err && (
          <p style={{ textAlign: "center", fontFamily: SANS, fontSize: 13, color: C.danger, marginBottom: 4 }}>密碼錯誤，請再試一次</p>
        )}
        <div style={{ height: 24 }} />

        {/* Numpad */}
        <div style={{ display: "grid", gridTemplateRows: "repeat(4,1fr)", gap: 12 }}>
          {KEYS.map((row, ri) => (
            <div key={ri} style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12 }}>
              {row.map((k, ki) => {
                if (k === "") return <div key={ki} />;
                const isDel = k === "←";
                return (
                  <button
                    key={ki}
                    onClick={() => isDel ? del() : press(k)}
                    style={{
                      height: 64, borderRadius: 16,
                      background: isDel ? "transparent" : C.card,
                      border: isDel ? "none" : `1.5px solid ${C.line}`,
                      boxShadow: isDel ? "none" : "0 3px 0 rgba(35,31,24,0.08)",
                      cursor: "pointer",
                      fontFamily: SERIF, fontSize: isDel ? 22 : 24, fontWeight: 900,
                      color: isDel ? C.inkSoft : C.ink,
                      transition: "transform .08s, box-shadow .08s",
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}
                    onMouseDown={e => { e.currentTarget.style.transform = "translateY(2px)"; e.currentTarget.style.boxShadow = "0 1px 0 rgba(35,31,24,0.08)"; }}
                    onMouseUp={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}
                    onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}
                  >
                    {k}
                  </button>
                );
              })}
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}
